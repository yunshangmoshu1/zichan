<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0891b2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ROBO::TRACK">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ROBO::TRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f5f7;--surface:#ffffff;--surface2:#f8f9fb;--surface3:#eef0f4;
  --border:#e2e5eb;--border-light:#d0d4dc;
  --text:#1a1d2e;--text2:#555a6e;--text3:#8b90a0;
  --cyan:#0891b2;--cyan-dim:rgba(8,145,178,.15);--cyan-bg:rgba(8,145,178,.05);
  --green:#059669;--green-bg:rgba(5,150,105,.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.06);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.06);
  --radius:6px;--radius-lg:10px;
}
html{background:var(--bg)}
body{font-family:'DM Sans',system-ui,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
::selection{background:var(--cyan);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* === HEADER === */
.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;letter-spacing:2px;color:var(--cyan);flex:1}
.logo span{color:var(--text3);font-weight:400}
.conn-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text3);transition:background .3s}
.conn-status.online{background:var(--green)}
.conn-status.offline{background:var(--amber)}
.header-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;
  transition:all .2s;min-height:40px;display:inline-flex;align-items:center;
}
.header-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-bg)}
.header-btn.accent{background:var(--cyan);border-color:var(--cyan);color:#fff}
.header-btn.accent:hover{filter:brightness(1.1)}

/* === TABS === */
.tabs{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:12px 20px;font-size:13px;font-weight:500;border:none;background:none;
  color:var(--text3);position:relative;white-space:nowrap;transition:color .2s;
  min-height:44px;display:flex;align-items:center;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--cyan)}
.tab.active::after{
  content:'';position:absolute;bottom:-1px;left:12px;right:12px;
  height:2px;background:var(--cyan);border-radius:1px;
}
.tab-icon{display:none}
.fab-scan{display:none}

/* === CONTAINER === */
.container{max-width:1080px;margin:0 auto;padding:20px}

/* === CARDS === */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;
}

/* === BADGES === */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;letter-spacing:.3px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge-testing{background:var(--green-bg);color:var(--green)}
.badge-testing::before{background:var(--green)}
.badge-loaned{background:var(--amber-bg);color:var(--amber)}
.badge-loaned::before{background:var(--amber)}
.badge-repair{background:var(--red-bg);color:var(--red)}
.badge-repair::before{background:var(--red)}
.badge-deployed{background:var(--surface3);color:var(--text3)}
.badge-deployed::before{background:var(--text3)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-blue::before{background:var(--blue)}
.badge-cyan{background:var(--cyan-bg);color:var(--cyan)}
.badge-cyan::before{background:var(--cyan)}
.badge-yes{background:var(--amber-bg);color:var(--amber)}

/* === STATS === */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 14px;flex:1 1 calc(50% - 8px);min-width:100px;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;line-height:1;color:var(--text)}
.stat-label{font-size:13px;color:var(--text3);line-height:1}

/* === SEARCH === */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{
  flex:1;min-width:180px;padding:10px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-size:14px;outline:none;transition:border-color .2s;
}
.search-bar input:focus{border-color:var(--cyan)}
.search-bar input::placeholder{color:var(--text3)}
.search-bar select{
  padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:13px;
}
.search-bar select:focus{border-color:var(--cyan);outline:none}
.mobile-add-btn{display:none}

/* === TABLE === */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
  background:var(--surface2);padding:10px 14px;text-align:left;font-weight:600;
  white-space:nowrap;font-size:12px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.8px;border-bottom:1px solid var(--border);
}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
tr{cursor:pointer;transition:background .15s}
tr:hover{background:var(--cyan-bg);}
.serial{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--cyan);font-weight:500}
.row-check{
  appearance:none;width:20px;height:20px;border:1.5px solid var(--border-light);
  border-radius:4px;cursor:pointer;position:relative;transition:all .15s;background:#fff;
}
.row-check:checked{background:var(--cyan);border-color:var(--cyan)}
.row-check:checked::after{content:'✓';position:absolute;top:0;left:4px;font-size:13px;color:#fff;font-weight:700}
#selectAll{appearance:none;width:20px;height:20px;border:1.5px solid var(--border-light);border-radius:4px;cursor:pointer;background:#fff}
#selectAll:checked{background:var(--cyan);border-color:var(--cyan)}
.label-check:checked{background:var(--cyan)!important;border-color:var(--cyan)!important}
.label-check:checked::after{content:'✓';position:relative;top:-1px;left:3px;font-size:12px;color:#fff;font-weight:700}
.btn-del{
  background:none;border:1px solid transparent;color:var(--text3);
  font-size:11px;padding:4px 10px;cursor:pointer;border-radius:4px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;transition:all .15s;
}
.btn-del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.sort-arrow{font-size:10px;color:var(--text3);margin-left:2px}
.sort-arrow.asc::after{content:'▲'}
.sort-arrow.desc::after{content:'▼'}

/* === BATCH BAR === */
.batch-bar{
  padding:12px 18px;background:var(--red-bg);border:1px solid rgba(248,113,113,.2);
  border-radius:var(--radius-lg);margin-bottom:16px;
  display:flex;align-items:center;gap:14px;
}
.batch-bar span{font-size:13px;color:var(--red);font-weight:500}

/* === BUTTONS === */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border:none;border-radius:var(--radius);
  font-size:13px;font-weight:600;transition:all .2s;letter-spacing:.3px;
}
.btn-primary{background:var(--cyan);color:var(--bg)}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 0 20px var(--cyan-dim)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-light);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-group{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-sm{padding:7px 14px;font-size:12px}

/* === FORMS === */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan-dim)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* === AUTOCOMPLETE === */
.autocomplete-wrap{position:relative}
.autocomplete-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  max-height:160px;overflow-y:auto;z-index:50;display:none;
}
.autocomplete-item{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s}
.autocomplete-item:hover{background:var(--cyan-bg);color:var(--cyan)}

/* === SCANNER === */
.scanner-wrap{position:relative;width:100%;max-width:400px;margin:0 auto;border-radius:var(--radius-lg);overflow:hidden}
.scanner-wrap video{width:100%;display:block}
.scanner-overlay{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:280px;height:160px;border:2px solid var(--cyan);border-radius:12px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.3);
}
.scanner-status{text-align:center;margin-top:16px;font-size:14px;color:var(--text3)}

/* === LABELS === */
.labels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.label-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;
  text-align:center;background:var(--surface);page-break-inside:avoid;
  transition:box-shadow .2s;
}
.label-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.label-info{font-size:12px;margin-top:10px;color:var(--text2)}
.label-info strong{display:block;color:var(--text);font-size:13px;margin-bottom:2px}
.label-info .mono{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:11px}

/* === INVENTORY === */
.inv-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:8px;background:var(--surface);transition:all .15s;
}
.inv-item:hover{background:var(--cyan-bg);border-color:var(--cyan-dim)}
.inv-item .info{flex:1;min-width:0}
.inv-item .info strong{font-size:14px;color:var(--text);display:block}
.inv-item .info .serial{margin-left:6px}
.inv-item .meta-line{font-size:12px;color:var(--text3);margin-top:2px}
.inv-actions{display:flex;gap:8px;flex-shrink:0}
.inv-btn{
  padding:7px 16px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:12px;font-weight:600;background:var(--surface);color:var(--text2);
  transition:all .2s;
}
.inv-btn:hover{border-color:var(--text3)}
.inv-btn.confirmed{background:var(--green);color:#fff;border-color:var(--green)}
.inv-btn.missing{background:var(--red);color:#fff;border-color:var(--red)}
.inv-edit-icon{cursor:pointer;opacity:.4;font-size:14px;margin-left:4px;transition:opacity .2s;padding:8px;margin:-8px -8px -8px 4px}
.inv-edit-icon:hover{opacity:1}
.inv-loc-edit{padding:12px 16px;background:var(--surface);border:1px solid var(--cyan);border-radius:var(--radius);margin-bottom:8px;position:relative}
.inv-loc-edit .inv-loc-input{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;transition:border-color .2s}
.inv-loc-edit .inv-loc-input:focus{border-color:var(--cyan)}
.inv-loc-edit .inv-loc-actions{display:flex;gap:8px;margin-top:10px}
.inv-loc-edit .inv-loc-actions .btn{flex:1;justify-content:center;padding:10px;font-size:13px}

/* === EMPTY / LOADING === */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.loading{text-align:center;padding:48px 20px;color:var(--text3)}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--border);border-top-color:var(--cyan);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* === TOAST === */
.toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--text);color:#fff;padding:10px 20px;
  border-radius:var(--radius);
  font-size:13px;font-weight:500;z-index:200;
  opacity:0;transition:all .25s;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* === MODAL === */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-box{
  background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:24px;width:100%;max-width:480px;
  transform:translateY(100%);transition:transform .3s ease;
}
.modal-overlay.show .modal-box{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:8px}
.modal-desc{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1;justify-content:center}

/* === BACK TO TOP === */
.back-top{
  position:fixed;bottom:24px;right:24px;width:40px;height:40px;
  background:var(--surface);border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--text2);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:90;
  opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;
}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}

/* === SCANNER SUCCESS === */
.scanner-success{animation:scanFlash .4s ease}
@keyframes scanFlash{
  0%{box-shadow:0 0 0 9999px rgba(0,0,0,.3)}
  50%{box-shadow:0 0 0 9999px rgba(5,150,105,.5);border-color:var(--green)}
  100%{box-shadow:0 0 0 9999px rgba(0,0,0,.3)}
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* === COLLAPSIBLE === */
.collapsible-header{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;padding:4px 0;
}
.collapsible-header h3{margin:0}
.collapsible-header .chevron{transition:transform .2s;font-size:12px;color:var(--text3)}
.collapsible-header.open .chevron{transform:rotate(180deg)}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible-body.open{max-height:2000px}

/* === CONFIG === */
.config-panel{
  background:var(--amber-bg);border:1px solid rgba(217,119,6,.2);border-radius:var(--radius-lg);
  padding:20px;margin-bottom:16px;
}
.config-panel h3{margin-bottom:10px;font-size:14px;color:var(--amber)}
.config-panel input{
  width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;color:var(--text);font-size:13px;
  font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;
}
.config-panel input:focus{border-color:var(--amber)}

/* === DETAIL === */
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.detail-header h2{font-size:22px;font-weight:700;color:var(--text)}
.detail-header .sub{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text3);margin-top:2px}
.detail-back{display:none;background:none;border:none;font-size:20px;color:var(--cyan);padding:4px 8px;margin:-4px 0 -4px -8px;cursor:pointer}
.detail-hero{background:linear-gradient(135deg,var(--cyan-bg),var(--surface))}
.detail-meta{display:flex;gap:16px;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:12px}
.meta{font-size:12px;color:var(--text3);margin-bottom:16px;font-family:'JetBrains Mono',monospace}
.section-title{
  font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1.2px;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--surface3);
}

/* === CHANGE LOG === */
.change-item{padding:8px 0;border-bottom:1px solid var(--surface3);font-size:13px}
.change-item:last-child{border-bottom:none}
.change-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.change-field{font-weight:600;color:var(--text)}
.change-time{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.change-body{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:12px;margin-bottom:2px}
.change-old{background:var(--red-bg);padding:1px 6px;border-radius:3px;text-decoration:line-through;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.change-arrow{color:var(--text3);flex-shrink:0}
.change-new{background:var(--green-bg);padding:1px 6px;border-radius:3px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.change-user{font-size:11px;color:var(--text3)}

/* === CARD META (list view) === */
.card-meta{font-size:11px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}

/* === PRINT === */
@media print{
  .header,.tabs,.search-bar,.stats,.btn-group,.no-print{display:none!important}
  .labels-grid{grid-template-columns:repeat(3,1fr)}
  .card{border:1px solid #ddd;box-shadow:none}
  .label-card{border:1px solid #ddd}
}

/* === MISC === */
code{font-family:'JetBrains Mono',monospace;background:var(--surface3);padding:2px 6px;border-radius:3px;font-size:12px}

/* === RESPONSIVE === */
@media(max-width:640px){
  body{padding-bottom:calc(60px + env(safe-area-inset-bottom,0px))}
  .container{padding:12px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}

  /* Header: simplified */
  .header{padding:0 12px;gap:8px}
  .header-btn{padding:8px 10px;font-size:12px;min-height:36px}
  .header-btn.add-btn{display:none}
  .logo{font-size:13px;letter-spacing:1px}

  /* Bottom tab bar */
  .tabs{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);border-bottom:none;
    display:flex;justify-content:space-around;
    padding:0;padding-bottom:env(safe-area-inset-bottom,0px);
    z-index:100;gap:0;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:1;flex-direction:column;gap:2px;
    font-size:10px;padding:8px 0;min-height:50px;
    border:none;white-space:nowrap;
  }
  .tab-icon{display:inline;font-size:18px;line-height:1}
  .tab-text{font-size:10px;line-height:1}
  .tab.active::after{
    top:0;bottom:auto;
    left:20%;right:20%;height:2px;
  }

  /* FAB scan button */
  .fab-scan{
    display:flex;position:fixed;
    bottom:calc(60px + env(safe-area-inset-bottom,0px));
    right:16px;z-index:101;
    width:52px;height:52px;border-radius:50%;
    background:var(--cyan);color:#fff;border:none;
    font-size:22px;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(8,145,178,.35);
    transition:transform .2s;
  }
  .fab-scan:active{transform:scale(.92)}

<script>
function loadScript(urls, callback) {
  if (!urls.length) { console.error('All CDN sources failed for:', urls); return; }
  var s = document.createElement('script');
  s.src = urls[0];
  s.onload = callback;
  s.onerror = function() { console.warn('CDN failed:', urls[0], 'trying next...'); loadScript(urls.slice(1), callback); };
  document.head.appendChild(s);
}
var cdnBase = 'https://cdn.jsdelivr.net/npm/';
var cdnAlt = 'https://unpkg.com/';
loadScript([cdnBase + '@supabase/supabase-js@2/dist/umd/supabase.min.js', cdnAlt + '@supabase/supabase-js@2/dist/umd/supabase.min.js'], function() {
  loadScript([cdnBase + 'qrcode/build/qrcode.min.js', cdnAlt + 'qrcode/build/qrcode.min.js'], function() {
    loadScript([cdnBase + 'jsqr@1.4.0/dist/jsQR.min.js', cdnAlt + 'jsqr@1.4.0/dist/jsQR.min.js'], function() {
      // 初始化 BarcodeDetector（浏览器原生条码识别，支持 Code 128/39 等工厂条码）
      if (typeof BarcodeDetector !== 'undefined') {
        try {
          window._barcodeDetector = new BarcodeDetector({
            formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'qr_code']
          });
        } catch (e) { console.warn('BarcodeDetector init failed:', e); }
      }
      loadScript([cdnBase + 'xlsx@0.18.5/dist/xlsx.full.min.js', cdnAlt + 'xlsx@0.18.5/dist/xlsx.full.min.js'], function() {
        // All libraries loaded
        window._libsLoaded = true;
      });
    });
  });
});
</script>

function init() {
  // Check if user name is set
  const userName = localStorage.getItem('user_name');
  if (!userName) {
    showNamePrompt();
    return;
  }

  // Load config from localStorage
  const url = localStorage.getItem('sb_url') || SUPABASE_URL;
  const key = localStorage.getItem('sb_key') || SUPABASE_ANON_KEY;

  if (url && key && url !== 'YOUR_SUPABASE_URL' && key !== 'YOUR_SUPABASE_ANON_KEY') {
    // Try connecting to Supabase
    try {
      if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
        sbClient = window.supabase.createClient(url, key);
        loadFromSupabase();
      } else {
        console.warn('Supabase SDK not loaded, using cache');
        loadFromCacheOrShowConfig();
      }

      console.error('Supabase init error:', e);
      loadFromCacheOrShowConfig();

    loadFromCacheOrShowConfig();

async function loadFromCacheOrShowConfig() {

async function loadFromSupabase() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';

  try {
    const { data, error } = await sbClient
      .from('robots')
      .select('*')
      .order('type')
      .order('serial');

    if (error) throw error;

    robots = data || [];
    localStorage.setItem('robots_cache', JSON.stringify(robots));
    extractLocations();
    updateConnStatus();
    await loadInventoryState();
    showView('list');
  } catch (e) {
    app.innerHTML = `<div class="card"><h3 style="color:var(--red);margin-bottom:8px">连接失败</h3><p style="color:var(--text2)">${escapeHtml(e.message)}</p><p style="margin-top:12px;color:var(--text3)">请检查设置中的 Supabase 配置。</p><button class="btn btn-primary" onclick="showView('config')" style="margin-top:16px">前往设置</button></div>`;

}

async function saveToSupabase(robot) {
  if (!sbClient) {
    showToast('请先配置 Supabase 连接');
    return false;
  }

  try {
    const { updater, ...data } = robot;
    data.updater = localStorage.getItem('user_name') || '未知';

    if (robot.id) {
      const { error } = await sbClient.from('robots').update(data).eq('id', robot.id);
      if (error) throw error;
    } else {
      const { error } = await sbClient.from('robots').insert(data);
      if (error) throw error;
    }

    await loadFromSupabase();
    showToast('保存成功');
    return true;
  } catch (e) {
    showToast('保存失败: ' + e.message);
    return false;
  }
}

async function saveChangeLog(robotId, oldState, newState) {
  if (!sbClient || !robotId) return;
  const user = localStorage.getItem('user_name') || '未知';
  const entries = [];
  for (const [field, label] of Object.entries(CHANGE_FIELDS)) {
    const oldVal = oldState[field] == null ? '' : String(oldState[field]);
    const newVal = newState[field] == null ? '' : String(newState[field]);
    if (oldVal !== newVal) {
      entries.push({ robot_id: robotId, field: label, old_value: oldVal || null, new_value: newVal || null, changed_by: user });
    }
  }
  if (entries.length === 0) return;
  try {
    await sbClient.from('change_log').insert(entries);
  } catch (e) {
    console.error('Change log save failed:', e);
  }
}

async function loadChangeLog(robotId) {
  changeLogData = [];
  if (!sbClient || !robotId) return;
  try {
    const { data, error } = await sbClient.from('change_log')
      .select('*').eq('robot_id', robotId).order('changed_at', { ascending: false }).limit(50);
    if (!error && data) changeLogData = data;
  } catch (e) {
    console.error('Change log load failed:', e);

  renderChangeLog();

  const el = document.getElementById('changeLogList');

}

function sortBy(field) {
  if (sortField === field) { sortAsc = !sortAsc; }
  else { sortField = field; sortAsc = true; }
  // Update sort arrows
  document.querySelectorAll('.sort-arrow').forEach(el => { el.className = 'sort-arrow'; });
  const arrow = document.getElementById('sort-' + field);
  if (arrow) arrow.className = 'sort-arrow ' + (sortAsc ? 'asc' : 'desc');
  filterList();
}

function filterList() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const typeFilter = document.getElementById('filterType')?.value || '';
  const statusFilter = document.getElementById('filterStatus')?.value || '';
  const locationFilter = document.getElementById('filterLocation')?.value || '';

  let filtered = robots.filter(r => {
    if (typeFilter && r.type !== typeFilter) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (locationFilter && (r.location || '') !== locationFilter) return false;
    if (query) {
      const text = `${r.type} ${r.serial} ${r.person||''} ${r.location||''} ${r.notes||''} ${r.ip||''}`.toLowerCase();
      if (!text.includes(query)) return false;
    }
    return true;
  });

  // Sort
  if (sortField) {
    filtered.sort((a, b) => {
      const va = (a[sortField] || '').toString().toLowerCase();
      const vb = (b[sortField] || '').toString().toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('robotBody');
  const empty = document.getElementById('emptyState');

  if (!tbody) return;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }

  if (empty) empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => `
    <tr data-status="${escapeHtml(r.status)}" onclick="showDetail(robots.find(x=>x.id==='${esc(r.id)}'))">
      <td data-label=""><input type="checkbox" class="row-check" data-id="${escapeHtml(r.id)}" onclick="event.stopPropagation();updateBatchBar()"></td>
      <td data-label="类型">${escapeHtml(r.type)}</td>

  `).join('');

function statusClass(status) {
  const colorMap = {
    '测试中':'badge-testing','借出中':'badge-loaned','返修中':'badge-repair',
    '已出库':'badge-deployed'
  };
  if (colorMap[status]) return colorMap[status];
  const colors = ['badge-blue','badge-cyan','badge-testing','badge-loaned','badge-repair','badge-deployed'];
  let hash = 0;
  for (let i = 0; i < status.length; i++) hash = ((hash << 5) - hash) + status.charCodeAt(i);
  return colors[Math.abs(hash) % colors.length];
}

async function doBatchDelete() {
  const checked = document.querySelectorAll('.row-check:checked');
  const ids = Array.from(checked).map(cb => cb.dataset.id);
  let success = 0, fail = 0;
  for (const id of ids) {
    try {
      const { error } = await sbClient.from('robots').delete().eq('id', id);
      if (!error) success++; else fail++;
    } catch { fail++; }
  }
  showToast(fail ? `已删除 ${success} 条，${fail} 条失败` : `已删除 ${success} 条`);
  await loadFromSupabase();
}

async function batchUpdateStatus() {
  const newStatus = document.getElementById('batchStatus').value;
  if (!newStatus) { showToast('请选择状态'); return; }
  const checked = document.querySelectorAll('.row-check:checked');
  const ids = Array.from(checked).map(cb => cb.dataset.id);
  if (!ids.length) return;

  let success = 0, fail = 0;
  for (const id of ids) {
    try {
      const { error } = await sbClient.from('robots').update({ status: newStatus }).eq('id', id);
      if (!error) success++; else fail++;
    } catch { fail++; }
  }
  showToast(fail ? `已更新 ${success} 条，${fail} 条失败` : `已更新 ${success} 条状态为 ${newStatus}`);
  document.getElementById('batchStatus').value = '';
  await loadFromSupabase();
}

function exportFiltered() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const typeFilter = document.getElementById('filterType')?.value || '';
  const statusFilter = document.getElementById('filterStatus')?.value || '';
  const locationFilter = document.getElementById('filterLocation')?.value || '';

  let filtered = robots.filter(r => {
    if (typeFilter && r.type !== typeFilter) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (locationFilter && (r.location||'') !== locationFilter) return false;
    if (query) {
      const text = `${r.type} ${r.serial} ${r.person||''} ${r.location||''} ${r.notes||''}`.toLowerCase();
      if (!text.includes(query)) return false;
    }
    return true;
  });

  if (!filtered.length) { showToast('无匹配数据可导出'); return; }

  const rows = filtered.map(r => ({
    '机器人类型': r.type,
    '出厂编号': r.serial,
    '状态': r.status,
    '责任人': r.person || '',
    'IP': r.ip || '',
    '位置': r.location || '',
    '备注': r.notes || '',
    '是否借出': r.borrowed ? 'OK' : '',
    '更新人': r.updater || '',
    '更新时间': r.updated_at || '',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '入库管理');
  XLSX.writeFile(wb, '机器人资产_筛选导出_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  showToast(`已导出 ${filtered.length} 条`);
}

function previewImage(input) {
  const preview = document.getElementById('imagePreview');
  if (!preview || !input.files.length) return;

  const file = input.files[0];
  if (file.size > 5 * 1024 * 1024) {
    showToast('图片不能超过 5MB');
    input.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:var(--radius);border:1px solid var(--border)">`;
  };
  reader.readAsDataURL(file);
}

async function uploadImage() {
  const input = document.getElementById('imageFile');
  if (!input.files.length) { showToast('请先选择图片'); return; }
  if (!editingRobot) return;

  const file = input.files[0];
  showToast('正在压缩和上传...');

  try {
    // Compress image
    const compressed = await compressImage(file, 800, 0.7);

    // Upload to Supabase Storage
    if (sbClient) {
      const fileName = `robots/${editingRobot.type}_${editingRobot.serial}_${Date.now()}.jpg`;

      // Try to upload to storage
      const { data, error } = await sbClient.storage
        .from('images')
        .upload(fileName, compressed, { contentType: 'image/jpeg', upsert: true });

      if (error) {
        // Storage might not be set up, fallback to base64
        console.warn('Storage upload failed, using base64:', error);
        const reader = new FileReader();
        reader.onload = async function(e) {
          editingRobot.image = e.target.result;
          await saveToSupabase(editingRobot);
          showToast('图片已保存（base64）');
        };
        reader.readAsDataURL(compressed);
      } else {
        // Get public URL
        const { data: urlData } = sbClient.storage.from('images').getPublicUrl(fileName);
        editingRobot.image = urlData.publicUrl;
        await saveToSupabase(editingRobot);
        showToast('图片上传成功');
      }
    } else {
      // No Supabase, use base64
      const reader = new FileReader();
      reader.onload = async function(e) {
        editingRobot.image = e.target.result;
        showToast('图片已保存（本地）');
      };
      reader.readAsDataURL(compressed);
    }
  } catch (e) {
    showToast('上传失败: ' + e.message);
  }
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        if (width > maxSize || height > maxSize) {
          if (width > height) {
            height = (height / width) * maxSize;
            width = maxSize;
          } else {
            width = (width / height) * maxSize;
            height = maxSize;
          }
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(function(blob) {
          if (blob) resolve(blob);
          else reject(new Error('压缩失败'));
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let scannerStream = null;
let scannerAnimFrame = null;

async function startScanner() {
  const video = document.getElementById('scannerVideo');
  const status = document.getElementById('scannerStatus');
  if (!video || !status) return;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.innerHTML = '摄像头不可用：需要 HTTPS 安全连接<br><small style="color:var(--text3)">请使用 HTTPS 地址访问，或使用下方手动输入功能</small>';
    return;
  }

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = scannerStream;
    await video.play();
    status.textContent = '请将二维码或条码对准摄像头';

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    let _lastBDTime = 0;
    async function scan() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const maxW = 800;
        const scale = video.videoWidth > maxW ? maxW / video.videoWidth : 1;
        canvas.width = video.videoWidth * scale;
        canvas.height = video.videoHeight * scale;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let decoded = null;

        // 1. jsQR（QR 码识别，同步快速）
        if (typeof jsQR !== 'undefined') {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const qr = jsQR(imageData.data, imageData.width, imageData.height);
          if (qr) decoded = qr.data;
        }

        // 2. BarcodeDetector（原生条码+QR，每200ms检测一次避免性能问题）
        if (!decoded && window._barcodeDetector && Date.now() - _lastBDTime > 200) {
          _lastBDTime = Date.now();
          try {
            const results = await window._barcodeDetector.detect(video);
            if (results.length > 0) decoded = results[0].rawValue;
          } catch {}
        }

        if (decoded) {
          handleScanResult(decoded);
          return;
        }
      }
      scannerAnimFrame = requestAnimationFrame(scan);
    }
    scan();
  } catch (e) {
    let msg = '无法访问摄像头';
    if (e.name === 'NotAllowedError') msg = '摄像头权限被拒绝，请在浏览器设置中允许摄像头访问';
    else if (e.name === 'NotFoundError') msg = '未找到摄像头设备';
    else msg = '摄像头错误: ' + e.message;
    status.innerHTML = msg + '<br><small style="color:var(--text3)">可使用下方手动输入功能</small><br><button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="startScanner()">重试</button>';
  }
}

function stopScanner() {
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  if (scannerAnimFrame) {
    cancelAnimationFrame(scannerAnimFrame);
    scannerAnimFrame = null;
  }
}

function handleScanResult(data) {
  stopScanner();

  let lookupType = null;
  let lookupSerial = null;

  // 1. 尝试解析为 URL（系统生成的 QR 码）
  try {
    const url = new URL(data);
    const idParam = url.searchParams.get('id');
    if (idParam) {
      const parts = idParam.split('__');
      if (parts.length === 2) {
        lookupType = parts[0];
        lookupSerial = parts[1];
      } else {
        lookupSerial = idParam;
      }
    }
  } catch {}

  // 2. 非 URL：纯数字为工厂条码 SN，其他按原样匹配
  if (!lookupSerial) {
    lookupSerial = data.trim();
  }

  // 匹配逻辑
  let matches;
  if (lookupType && lookupSerial) {
    matches = robots.filter(r => r.type === lookupType && r.serial === lookupSerial);
  } else {
    matches = robots.filter(r => r.serial === lookupSerial);
  }

  // 路由
  if (matches.length === 1) {
    if (navigator.vibrate) navigator.vibrate(200);
    showScanResult(matches[0]);
  } else if (matches.length > 1) {
    if (navigator.vibrate) navigator.vibrate(200);
    showScanDisambiguation(matches, lookupSerial);
  } else {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    showScanCreatePrompt(lookupSerial);
  }
}

async function scanCreateRobot() {
  const type = document.getElementById('scanNewType').value.trim();
  const serial = document.getElementById('scanNewSerial').value.trim();
  const status = document.getElementById('scanNewStatus').value;

  if (!type) { showToast('请选择机器人类型'); return; }
  if (!serial) { showToast('编号不能为空'); return; }

  const exists = robots.find(r => r.type === type && r.serial === serial);
  if (exists) {
    showToast('该机器人已存在，正在跳转...');
    showScanResult(exists);
    return;
  }

  const robot = {
    type, serial, status,
    borrowed: status === '借出中',
    person: null, location: null,
    notes: '通过扫码快速创建',
  };

  const ok = await saveToSupabase(robot);
  if (ok) {
    const newRobot = robots.find(r => r.type === type && r.serial === serial);
    if (newRobot) showDetail(newRobot, () => { showView('scanner'); });
  }
}

async function applyScanStatus(robotId) {
  const select = document.getElementById('scanStatus');
  if (!select) return;
  const newStatus = select.value;
  const robot = robots.find(r => r.id === robotId);
  if (!robot) return;

  const oldState = { ...robot };
  robot.status = newStatus;
  robot.borrowed = newStatus === '借出中';

  await saveChangeLog(robotId, oldState, robot);
  const ok = await saveToSupabase(robot);
  if (ok) {
    showScanResult(robot); // refresh the card
  }
}

async function applyScanLocation(robotId) {
  const input = document.getElementById('scanLocation');
  if (!input) return;
  const newLocation = input.value.trim();
  const robot = robots.find(r => r.id === robotId);
  if (!robot) return;

  const oldState = { ...robot };
  robot.location = newLocation;

  await saveChangeLog(robotId, oldState, robot);
  const ok = await saveToSupabase(robot);
  if (ok) {
    showScanResult(robot);
    showToast('位置已更新');
  }
}

let inventorySessionId = null;
let inventoryState = {}; // { robotId: { status, checkedBy, checkedAt } }

function getInventorySessionId() {
  if (!inventorySessionId) {
    inventorySessionId = 'inv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  }
  return inventorySessionId;
}

async function loadInventoryState() {
  // Try Supabase first
  if (sbClient) {
    try {
      const { data, error } = await sbClient.from('inventory_checks')
        .select('*')
        .order('checked_at', { ascending: false });
      if (!error && data) {
        inventoryState = {};
        data.forEach(check => {
          // Latest check per robot wins
          if (!inventoryState[check.robot_id]) {
            inventoryState[check.robot_id] = {
              status: check.status,
              checkedBy: check.checked_by,
              checkedAt: check.checked_at,
              sessionId: check.session_id,
            };
          }
        });
        return;
      }
    } catch (e) { console.warn('Inventory load from Supabase failed:', e); }
  }
  // Fallback to localStorage
  const saved = localStorage.getItem('inventory_state');
  if (saved) {
    try {
      const local = JSON.parse(saved);
      inventoryState = {};
      Object.entries(local).forEach(([id, status]) => {
        inventoryState[id] = { status, checkedBy: '本地', checkedAt: null };
      });
    } catch {}
  }
}

async function saveInventoryCheck(robotId, status) {
  const userName = localStorage.getItem('user_name') || '未知';
  const sessionId = getInventorySessionId();

  // Update local state immediately
  inventoryState[robotId] = { status, checkedBy: userName, checkedAt: new Date().toISOString() };

  // Save to Supabase
  if (sbClient) {
    try {
      await sbClient.from('inventory_checks').upsert({
        robot_id: robotId,
        status,
        checked_by: userName,
        session_id: sessionId,
      }, { onConflict: 'robot_id,session_id' });
    } catch (e) {
      console.warn('Inventory save to Supabase failed:', e);
    }
  }

  // Also save to localStorage as backup
  const local = {};
  Object.entries(inventoryState).forEach(([id, s]) => { local[id] = s.status; });
  localStorage.setItem('inventory_state', JSON.stringify(local));
}

        ${byLocation[loc].map(r => {

          const checkedClass = check ? (check.status === 'confirmed' ? 'confirmed' : 'missing') : '';
          const checkedBy = check ? `<span style="font-size:10px;color:var(--text3)">${escapeHtml(check.checkedBy||'')}</span>` : '';
          return `

            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('')}
  `;
}

async function markInventory(id, status, btn) {
  const item = document.getElementById(`inv-${id}`);
  if (!item) return;

  // Reset buttons
  item.querySelectorAll('.inv-btn').forEach(b => b.classList.remove('confirmed', 'missing'));
  btn.classList.add(status);

  await saveInventoryCheck(id, status);
  updateInventoryStats();
}

function updateInventoryStats() {
  const confirmed = Object.values(inventoryState).filter(s => s.status === 'confirmed').length;
  const missing = Object.values(inventoryState).filter(s => s.status === 'missing').length;

  const el1 = document.getElementById('invConfirmed');
  const el2 = document.getElementById('invMissing');
  if (el1) el1.textContent = confirmed;
  if (el2) el2.textContent = missing;
}

function resetInventory() {
  showModal('重置盘点', '确定要重置所有盘点状态吗？',
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button>
     <button class="btn btn-danger" onclick="closeModal();doResetInventory()">重置</button>`
  );
}
async function doResetInventory() {
  // Clear Supabase - only current session
  if (sbClient && inventorySessionId) {
    try {
      await sbClient.from('inventory_checks').delete().eq('session_id', inventorySessionId);
    } catch (e) { console.warn('Clear inventory from Supabase failed:', e); }
  }
  inventoryState = {};
  localStorage.removeItem('inventory_state');
  inventorySessionId = null;
  renderInventory();
  showToast('盘点已重置');
}

function exportInventoryResult() {
  if (!Object.keys(inventoryState).length) { showToast('尚无盘点数据'); return; }

  const rows = robots.map(r => {
    const check = inventoryState[r.id];
    return {
      '机器人类型': r.type,
      '出厂编号': r.serial,
      '位置': r.location || '未分配',
      '状态': r.status,
      '责任人': r.person || '',
      '盘点结果': check ? (check.status === 'confirmed' ? '在位' : '未找到') : '未盘点',
      '盘点人': check?.checkedBy || '',
      '盘点时间': check?.checkedAt ? new Date(check.checkedAt).toLocaleString('zh-CN') : '',
    };
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '盘点结果');
  XLSX.writeFile(wb, '盘点结果_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  showToast('导出成功');
}

async function importFromXlsx() {
  const fileInput = document.getElementById('importFile');
  const status = document.getElementById('importStatus');
  if (!fileInput.files.length) { showToast('请选择文件'); return; }

  status.innerHTML = '<div class="spinner"></div> 读取中...';

  const file = fileInput.files[0];
  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);

  // Find the sheet with "入库" in name
  let sheetName = workbook.SheetNames.find(n => n.includes('入库'));
  if (!sheetName) sheetName = workbook.SheetNames[0];

  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  if (rows.length < 2) { status.textContent = '数据为空'; return; }

  // Map columns
  const header = rows[0];
  const robotsData = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[1]) continue;

    const borrowed = String(row[7] || '').toUpperCase();
    robotsData.push({
      type: String(row[0] || '').trim(),
      serial: String(row[1] || '').trim(),
      status: String(row[2] || '测试中').trim(),
      person: String(row[3] || '').trim() || null,
      ip: String(row[4] || '').trim() || null,
      location: String(row[5] || '').trim() || null,
      notes: String(row[6] || '').trim() || null,
      borrowed: borrowed === 'OK' || borrowed === 'TRUE' || borrowed === '是',
      image: String(row[8] || '').trim() || null,
      updater: localStorage.getItem('user_name') || '导入',
    });
  }

  status.innerHTML = `<div class="spinner"></div> 正在导入 ${robotsData.length} 条记录...`;

  if (!sbClient) {
    // Save to localStorage only
    localStorage.setItem('robots_cache', JSON.stringify(robotsData));
    robots = robotsData;
    status.textContent = `已导入 ${robotsData.length} 条到本地缓存（未配置 Supabase）`;
    return;
  }

  // Batch insert to Supabase
  let success = 0;
  let errors = 0;
  const batchSize = 20;

  for (let i = 0; i < robotsData.length; i += batchSize) {
    const batch = robotsData.slice(i, i + batchSize);
    try {
      const { error } = await sbClient.from('robots').upsert(batch, { onConflict: 'type,serial' });
      if (error) { errors += batch.length; console.error(error); }
      else { success += batch.length; }
    } catch (e) {
      errors += batch.length;
      console.error(e);
    }
    status.innerHTML = `<div class="spinner"></div> 已导入 ${success}/${robotsData.length}...`;
  }

  status.textContent = `导入完成: ${success} 成功, ${errors} 失败`;
  await loadFromSupabase();
}

function exportToXlsx() {
  if (!robots.length) { showToast('无数据可导出'); return; }

  const rows = robots.map(r => ({
    '机器人类型': r.type,
    '出厂编号': r.serial,
    '状态': r.status,
    '责任人': r.person || '',
    'IP': r.ip || '',
    '位置': r.location || '',
    '备注': r.notes || '',
    '是否借出': r.borrowed ? 'OK' : '',
    '更新人': r.updater || '',
    '更新时间': r.updated_at || '',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '入库管理');
  XLSX.writeFile(wb, '机器人资产_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  showToast('导出成功');
}

function exportToJson() {
  const blob = new Blob([JSON.stringify(robots, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'robots_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== UTILS =====
function extractLocations() {
  locations = [...new Set(robots.map(r => r.location).filter(Boolean))].sort();
}

function formatNotes(notes) {
  if (!notes) return '<span style="color:var(--text3)">暂无备注</span>';
  return notes.split('\n').filter(Boolean).map(line => {
    const isDate = /^\[/.test(line);
    return `<div style="${isDate?'font-size:11px;color:var(--text3);margin-top:6px':'padding-left:8px'}">${escapeHtml(line)}</div>`;
  }).join('');
}

function appendNote() {
  const input = document.getElementById('d_notes_new');
  const hidden = document.getElementById('d_notes');
  const history = document.getElementById('notesHistory');
  if (!input || !hidden || !history) return;
  const val = input.value.trim();
  if (!val) return;

  const now = new Date().toLocaleString('zh-CN');
  const userName = localStorage.getItem('user_name') || '未知';
  const newEntry = `[${now} ${userName}] ${val}`;
  const existing = hidden.value || '';
  hidden.value = existing ? existing + '\n' + newEntry : newEntry;
  input.value = '';

  history.innerHTML = formatNotes(hidden.value);
  history.scrollTop = history.scrollHeight;
}

function extractPersons() {
  const persons = [];
  robots.forEach(r => {
    if (r.person) {
      // Split by comma for multiple persons
      r.person.split(/[,，]/).forEach(p => {
        const trimmed = p.trim();
        if (trimmed && !persons.includes(trimmed)) persons.push(trimmed);
      });
    }
  });
  return persons.sort();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== MODAL =====
function showModal(title, desc, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== UTILS =====
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/</g,'\\x3c').replace(/>/g,'\\x3e').replace(/\n/g,'\\n').replace(/\r/g,'\\r');
}

// ===== DATE FORMAT =====
function formatDate(dateStr) {
  if (!dateStr) return '-';
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
    return d.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
  } catch { return dateStr; }
}

// ===== DEBOUNCE =====
function debounce(fn, delay) {
  let timer;
  return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
}
const debouncedFilter = debounce(filterList, 200);

// ===== CONNECTION STATUS =====
function updateConnStatus() {
  const el = document.getElementById('connStatus');
  if (!el) return;
  el.className = 'conn-status ' + (sbClient ? 'online' : 'offline');
  el.title = sbClient ? '已连接 Supabase' : '离线模式（本地缓存）';
}

window.addEventListener('scroll', function() {
  const btn = document.getElementById('backTop');
  if (btn) btn.classList.toggle('show', window.scrollY > 400);
});

// Wait for all libraries to load, then init
function waitForLibs() {
  if (typeof window.supabase !== 'undefined' && typeof QRCode !== 'undefined' && (typeof jsQR !== 'undefined' || typeof BarcodeDetector !== 'undefined') && typeof XLSX !== 'undefined') {
    init();
  } else if (window._libsLoaded) {
    init();
  } else {
    setTimeout(waitForLibs, 100);
  }
}
// Start after a brief delay to let scripts begin loading
setTimeout(waitForLibs, 200);
